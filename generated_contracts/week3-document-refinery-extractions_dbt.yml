version: 2
models:
- name: week3-document-refinery-extractions
  description: Auto-generated dbt schema from Bitol contract week3-document-refinery-extractions
  columns:
  - name: doc_id
    tests:
    - not_null
    - unique
  - name: source_path
    description: The source path is the file name of the input document.
    tests:
    - not_null
  - name: source_hash
    tests:
    - not_null
  - name: extraction_model
    description: A unique identifier for the extraction model used in document refinement.
    tests:
    - not_null
    - accepted_values:
        values:
        - docling-layout-v1
        - layout-v1
        - layout-vision-fallback-v1
        - vision-ocr-v1
        - vision-v1
  - name: processing_time_ms
    description: The processing time in milliseconds for document extraction.
    tests:
    - not_null
  - name: extracted_at
    description: ISO 8601 datetime string.
    tests:
    - not_null
  - name: fact_fact_id
    tests:
    - not_null
    - unique
  - name: fact_text
    description: Text extracted from financial statements
    tests:
    - not_null
  - name: fact_confidence
    description: Confidence score. Must remain 0.0–1.0 float. BREAKING CHANGE if changed
      to 0–100 integer percentage.
    tests:
    - not_null
  - name: fact_page_ref
    description: A unique identifier for each fact page.
