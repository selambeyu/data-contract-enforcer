kind: DataContract
apiVersion: v3.0.0
id: langsmith-trace-runs
info:
  title: Langsmith Trace Runs
  version: 1.0.0
  owner: week7-enforcer
  description: 'Auto-generated contract for outputs/traces/runs.jsonl. Source snapshot:
    df705dc003f1620e. Generated at: 2026-04-04T11:58:50.093248+00:00.'
servers:
  local:
    type: local
    path: outputs/traces/runs.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: All confidence fields must remain in 0.0–1.0 float range. All _id fields
    must be valid UUID v4.
schema:
  id:
    type: string
    required: true
    llm_annotations:
      description: Unique identifier for each trace run
      business_rule: Must be unique across all trace runs in the table
      cross_column_note: Cannot be null and must match one of the values in the name
        or run_type columns
      annotated_by: llm
    description: Unique identifier for each trace run
  name:
    type: string
    required: true
    llm_annotations:
      description: A unique identifier for each trace run.
      business_rule: The name must be unique within each trace run.
      cross_column_note: Name is not dependent on adjacent columns.
      annotated_by: llm
    description: A unique identifier for each trace run.
  run_type:
    type: string
    required: true
    enum:
    - chain
    - llm
    - tool
    llm_annotations:
      description: The run type indicates the tool or chain used to generate the trace.
      business_rule: Run types must be either 'chain' or 'tool'.
      cross_column_note: No dependency on adjacent columns.
      annotated_by: llm
    description: The run type indicates the tool or chain used to generate the trace.
  error:
    type: string
    required: false
    enum:
    - evidence_not_found
    llm_annotations:
      description: A unique identifier for each trace run.
      business_rule: The error field must be non-empty and not equal to the word evidence_not_found
      cross_column_note: null
      annotated_by: llm
    description: A unique identifier for each trace run.
  start_time:
    type: string
    required: true
    llm_annotations:
      description: The start time of a trace run in ISO 8601 format
      business_rule: Values must be in the future relative to the end time
      cross_column_note: Dependent on end_time and run_type
      annotated_by: llm
    description: The start time of a trace run in ISO 8601 format
  end_time:
    type: string
    required: true
    llm_annotations:
      description: The end time of a trace run in ISO 8601 format
      business_rule: End times must be later than start times and not earlier than
        the current date
      cross_column_note: Dependent on start_time
      annotated_by: llm
    description: The end time of a trace run in ISO 8601 format
  total_tokens:
    type: integer
    required: true
    minimum: 0
    llm_annotations:
      description: The total number of tokens in the trace run.
      business_rule: The value must be a non-negative integer.
      cross_column_note: Dependent on prompt_tokens and completion_tokens.
      annotated_by: llm
    description: The total number of tokens in the trace run.
  prompt_tokens:
    type: integer
    required: true
    minimum: 0
    llm_annotations:
      description: The number of tokens in each trace run.
      business_rule: Tokens must be a positive integer.
      cross_column_note: Dependent on total_tokens and completion_tokens.
      annotated_by: llm
    description: The number of tokens in each trace run.
  completion_tokens:
    type: integer
    required: true
    minimum: 0
    llm_annotations:
      description: The number of completion tokens in each trace run.
      business_rule: Tokens must be non-negative integers.
      cross_column_note: Dependent on total_tokens and prompt_tokens.
      annotated_by: llm
    description: The number of completion tokens in each trace run.
  total_cost:
    type: number
    required: true
    minimum: 0
    llm_annotations:
      description: The total cost of the trace run in units of tokens
      business_rule: Total cost must be greater than zero and less than or equal to
        the total number of tokens
      cross_column_note: Total cost is dependent on total_tokens
      annotated_by: llm
    description: The total cost of the trace run in units of tokens
  parent_run_id:
    type: string
    required: false
    format: uuid
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
  session_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
quality:
  type: SodaChecks
  specification:
    checks for runs:
    - missing_count(id) = 0
    - missing_count(name) = 0
    - missing_count(run_type) = 0
    - missing_count(start_time) = 0
    - missing_count(end_time) = 0
    - missing_count(total_tokens) = 0
    - missing_count(prompt_tokens) = 0
    - missing_count(completion_tokens) = 0
    - missing_count(total_cost) = 0
    - missing_count(session_id) = 0
    - duplicate_count(session_id) = 0
lineage:
  upstream: []
  downstream:
  - id: week7-ai-extensions
    label: week7-ai-extensions
    fields_consumed:
    - id
    - run_type
    - inputs
    - outputs
    - total_tokens
    - total_cost
    - error
    - start_time
    - end_time
    breaking_fields:
    - field: run_type
      reason: Enum used to filter chain/tool/llm runs; adding undocumented values
        without contract update silently skews metrics
    - field: total_cost
      reason: Cost anomaly detection baseline depends on this field; type change or
        scale change breaks alerting
    - field: inputs
      reason: Prompt schema validation reads this structure; structural change breaks
        all input conformance checks
    - field: outputs
      reason: LLM output violation rate is computed from this structure; schema change
        breaks output conformance tracking
    tier: 3
