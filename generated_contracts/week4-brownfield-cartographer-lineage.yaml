terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: All confidence fields must remain in 0.0–1.0 float range. All _id fields
    must be valid UUID v4.
schema:
  snapshot_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
  codebase_root:
    type: string
    required: true
    enum:
    - /Users/melkam/Documents/10 Academy/Week4/ol-data-platform
    llm_annotations:
      description: The codebase root represents the top-level directory of the data
        platform.
      business_rule: The value must be an absolute path to a valid directory on the
        system.
      cross_column_note: This field depends on the snapshot_id and git_commit columns
        for its validity.
      annotated_by: llm
    description: The codebase root represents the top-level directory of the data
      platform.
  git_commit:
    type: string
    required: true
    enum:
    - 9d2b8c259f065d911fd426bc60c77dcfa454fcbb
    llm_annotations:
      description: The git_commit field contains the SHA-1 hash of the commit that
        created or updated the data.
      business_rule: The value must be a valid SHA-1 hash.
      cross_column_note: No dependency on adjacent columns.
      annotated_by: llm
    description: The git_commit field contains the SHA-1 hash of the commit that created
      or updated the data.
  captured_at:
    type: string
    required: true
    format: date-time
    description: ISO 8601 datetime string.
  node_node_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
  node_type:
    type: string
    required: true
    enum:
    - EXTERNAL
    - FILE
    - MODEL
    - PIPELINE
    - TABLE
    llm_annotations:
      description: The node type indicates the source of data for a cartographer lineage
      business_rule: Node types must be one of PIPELINE, FILE, EXTERNAL, TABLE, or
        MODEL
      cross_column_note: Node type depends on git_commit and captured_at
      annotated_by: llm
    description: The node type indicates the source of data for a cartographer lineage
  node_label:
    type: string
    required: true
    llm_annotations:
      description: A unique identifier for each node in the graph.
      business_rule: The value must be a valid UUID.
      cross_column_note: Dependent on captured_at and node_node_id.
      annotated_by: llm
    description: A unique identifier for each node in the graph.
quality:
  type: SodaChecks
  specification:
    checks for lineage_snapshots:
    - missing_count(snapshot_id) = 0
    - duplicate_count(snapshot_id) = 0
    - missing_count(codebase_root) = 0
    - missing_count(git_commit) = 0
    - missing_count(captured_at) = 0
    - missing_count(node_node_id) = 0
    - duplicate_count(node_node_id) = 0
    - missing_count(node_type) = 0
    - missing_count(node_label) = 0
lineage:
  upstream: []
  downstream:
  - id: week7-enforcer
    label: week7-enforcer
    fields_consumed:
    - snapshot_id
    - nodes
    - edges
    - git_commit
    - codebase_root
    breaking_fields:
    - field: edges.relationship
      reason: ViolationAttributor traverses edges by relationship type (PRODUCES/CONSUMES);
        rename breaks BFS traversal entirely
    - field: nodes.node_id
      reason: Used as reference key in edge source/target; structure change breaks
        all graph lookups
    - field: edges.source
      reason: BFS traversal key; any rename or type change breaks upstream producer
        discovery
    - field: edges.target
      reason: BFS traversal key; any rename or type change breaks downstream contamination
        mapping
    tier: 1
