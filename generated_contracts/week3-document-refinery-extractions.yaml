kind: DataContract
apiVersion: v3.0.0
id: week3-document-refinery-extractions
info:
  title: Week3 Document Refinery Extractions
  version: 1.0.0
  owner: week7-enforcer
  description: 'Auto-generated contract for outputs/week3/extractions.jsonl. Source
    snapshot: 3977ad436c588fd4. Generated at: 2026-04-04T11:57:47.067751+00:00.'
servers:
  local:
    type: local
    path: outputs/week3/extractions.jsonl
    format: jsonl
terms:
  usage: Internal inter-system data contract. Do not publish.
  limitations: All confidence fields must remain in 0.0–1.0 float range. All _id fields
    must be valid UUID v4.
schema:
  doc_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
  source_path:
    type: string
    required: true
    llm_annotations:
      description: The source path is the file name of the input document.
      business_rule: The source path must be a non-empty string and match the file
        extension of the input document.
      cross_column_note: This field depends on the adjacent doc_id column for data
        integrity.
      annotated_by: llm
    description: The source path is the file name of the input document.
  source_hash:
    type: string
    required: true
  extraction_model:
    type: string
    required: true
    enum:
    - docling-layout-v1
    - layout-v1
    - layout-vision-fallback-v1
    - vision-ocr-v1
    - vision-v1
    llm_annotations:
      description: A unique identifier for the extraction model used in document refinement.
      business_rule: The value must be a valid UUID.
      cross_column_note: No dependency on adjacent columns.
      annotated_by: llm
    description: A unique identifier for the extraction model used in document refinement.
  processing_time_ms:
    type: integer
    required: true
    minimum: 0
    llm_annotations:
      description: The processing time in milliseconds for document extraction.
      business_rule: Values must be non-negative integers.
      cross_column_note: Dependent on source_path and extraction_model.
      annotated_by: llm
    description: The processing time in milliseconds for document extraction.
  extracted_at:
    type: string
    required: true
    format: date-time
    description: ISO 8601 datetime string.
  fact_fact_id:
    type: string
    required: true
    format: uuid
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
  fact_text:
    type: string
    required: true
    llm_annotations:
      description: Text extracted from financial statements
      business_rule: Values must be in the format of synthetic block X of Y from Z_Audited_Financial_Statement_Report
      cross_column_note: No dependency on adjacent columns
      annotated_by: llm
    description: Text extracted from financial statements
  fact_confidence:
    type: number
    required: true
    minimum: 0.0
    maximum: 1.0
    description: Confidence score. Must remain 0.0–1.0 float. BREAKING CHANGE if changed
      to 0–100 integer percentage.
  fact_page_ref:
    type: number
    required: false
    minimum: 0
    llm_annotations:
      description: A unique identifier for each fact page.
      business_rule: The value must be a valid integer greater than 0.
      cross_column_note: Dependent on fact_fact_id and fact_text.
      annotated_by: llm
    description: A unique identifier for each fact page.
quality:
  type: SodaChecks
  specification:
    checks for extractions:
    - missing_count(doc_id) = 0
    - duplicate_count(doc_id) = 0
    - missing_count(source_path) = 0
    - missing_count(source_hash) = 0
    - missing_count(extraction_model) = 0
    - missing_count(processing_time_ms) = 0
    - missing_count(extracted_at) = 0
    - missing_count(fact_fact_id) = 0
    - duplicate_count(fact_fact_id) = 0
    - missing_count(fact_text) = 0
    - missing_count(fact_confidence) = 0
lineage:
  upstream: []
  downstream:
  - id: week4-brownfield-cartographer
    label: week4-brownfield-cartographer
    fields_consumed:
    - doc_id
    - extracted_facts
    - extraction_model
    - source_hash
    breaking_fields:
    - field: extracted_facts.confidence
      reason: Node ranking logic depends on 0.0–1.0 scale; changing to 0–100 silently
        inverts all threshold comparisons
    - field: doc_id
      reason: Used as node_id reference in lineage graph; must remain UUID v4 for
        graph joins
    - field: extracted_facts
      reason: Array structure is the schema contract; removing or renaming the array
        breaks ingestion entirely
    tier: 1
  - id: week5-event-sourcing-platform
    label: week5-event-sourcing-platform
    fields_consumed:
    - doc_id
    - extracted_facts
    - extraction_model
    - processing_time_ms
    breaking_fields:
    - field: extracted_facts.confidence
      reason: Event threshold filter (confidence >= 0.5) breaks silently if scale
        changes to 0–100; all events pass filter incorrectly
    - field: doc_id
      reason: Used as aggregate_id in event sourcing; must be UUID v4 to satisfy event
        schema contract
    tier: 1
  - id: week7-ai-extensions
    label: week7-ai-extensions
    fields_consumed:
    - extracted_facts
    - doc_id
    - extraction_model
    breaking_fields:
    - field: extracted_facts.confidence
      reason: Embedding drift baseline is computed only from facts with confidence
        >= 0.8; scale change corrupts the baseline corpus
    - field: extracted_facts
      reason: Array structure required for vectorisation; removing or renaming breaks
        embedding pipeline
    tier: 1
